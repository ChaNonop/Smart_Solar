; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


; 1. Base Environment (การตั้งค่าที่ใช้ร่วมกันทุกบอร์ด)
[env]
framework = arduino
; จัดการเวอร์ชันของไลบรารีที่ใช้ร่วมกันตรงนี้ที่เดียว

[env:arduino]
platform = atmelavr
board = nanoatmega328
upload_speed = 57600
upload_port = COM5
build_src_filter = +<uno/> -<Esp8266/>   ; เลือกเฉพาะโฟลเดอร์ uno
lib_deps = 
    adafruit/DHT sensor library @ ^1.4.6
    bblanchon/ArduinoJson @ ^7.4.2
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    adafruit/Adafruit VEML7700 Library @ ^2.1.6

build_flags = 
    -D TX= 2  # D2 เป็น RX (รับข้อมูลจาก ESP TX)
    -D RX= 3  # D2 เป็น RX (รับข้อมูลจาก ESP TX)
    -D dhtPin = 11

    -D Voltage_Pin_solar=A1
    -D Voltage_Pin_Battery=A2
    -D Current_Pin_In = A6
    -D Current_Pin_Out = A7

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
monitor_speed = 115200
upload_speed = 115200
upload_port = COM6
build_src_filter = +<Esp8266/> -<uno/> ; เลือกเฉพาะโฟลเดอร์ uno

lib_deps =   
    knolleary/PubSubClient @ ^2.8
    tzapu/WiFiManager @ ^2.0.17
    arduino-libraries/NTPClient @ ^3.2.1
    arduino-libraries/SD @ ^1.3.0
    adafruit/Adafruit VEML7700 Library @ ^2.1.6

build_flags =   
    -D TX= D5
    -D RX= D6
    -D Pin_Button=2
    -D Relay_Pin=4